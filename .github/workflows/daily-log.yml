name: Daily Study Log
on:
  schedule:
    - cron: "17 14 * * *"   # 23:17 KST — 그날 잔디 확정 (정각 피해 누락 방지)
    - cron: "23 21 * * *"   # 06:23 KST 다음날 — 전날 최종 시간 백필
  workflow_dispatch:
permissions:
  contents: write
jobs:
  log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate log
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/update_log.py
      - name: Commit if studied
        run: |
          git config user.name "Subin9227"
          git config user.email "sstudy9227@naver.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "study log (auto)"
            # 원격이 먼저 바뀌어도(non-fast-forward) 안전하게: rebase 후 push, 최대 3회 재시도
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin HEAD:main && break
              echo "push attempt $i failed, retrying..."; sleep 5
            done
          else
            echo "Nothing to commit."
          fi
