name: Daily Study Log
on:
  schedule:
    - cron: "0 14 * * *"   # 23:00 KST — 그날 잔디 확정
    - cron: "0 21 * * *"   # 06:00 KST 다음날 — 전날 최종 시간 백필
  workflow_dispatch:
permissions:
  contents: write
jobs:
  log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate log
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/update_log.py
      - name: Commit if studied
        run: |
          git config user.name "Subin9227"
          git config user.email "sstudy9227@naver.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "study log (auto)"
            git push
          else
            echo "Nothing to commit."
          fi
